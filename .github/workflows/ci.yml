name: matlab

on:
  push:
    paths:
    - "**.m"
    - "**.cmake"
    - "**/CMakeLists.txt"
    - "cmake/libraries.json"
    - ".github/workflows/**"
    - "!scripts/**"
    - "!examples/**"

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# full tests require >= R2023a

# https://www.mathworks.com/support/requirements/supported-compilers-linux.html

# https://www.mathworks.com/content/dam/mathworks/mathworks-dot-com/support/sysreq/files/system-requirements-release-2021b-supported-compilers.pdf
# R2021a, R2021b: GCC-8

# R2022a..R2024b: GCC-10
# https://www.mathworks.com/content/dam/mathworks/mathworks-dot-com/support/sysreq/files/system-requirements-release-2023a-supported-compilers.pdf


jobs:

  linux:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    # Ubuntu 22.04 GA Linux runner has GCC-10, needed for Matlab R2022a..R2025b

    strategy:
      fail-fast: false
      matrix:
        release: [R2025b, R2023b]

    steps:

    - name: Install MATLAB
      uses: matlab-actions/setup-matlab@v3
      with:
        release: ${{ matrix.release }}
        cache: true

    - name: Git Checkout ${{ github.action_repository }}
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: Run Matlab syntax checks
      if: ${{ matrix.release >= 'R2023b' }}
      timeout-minutes: 15
      uses: matlab-actions/run-build@v3
      with:
        tasks: check

    - name: Install prereqs
      uses: ./.github/workflows/composite-pkg
      timeout-minutes: 15

    - name: install Gemini3D executables
      uses: ./.github/workflows/composite-gemini3d
      timeout-minutes: 15
      env:
        CMAKE_INSTALL_PREFIX: ${{ github.workspace }}/libs
        CC: gcc-10
        CXX: g++-10
        FC: gfortran-10
    # avoid GLIBCXX conflicts causing subprocess_run to not work

    # this works for Matlab >= R2023a
    - name: set test env vars in loadenv() file
      run: |
        echo "GEMINI_ROOT=${{ github.workspace }}/libs" >> ~/gemini3d.env
        echo "GEMCI_ROOT=${{ github.workspace }}/gemci" >> ~/gemini3d.env
        echo "GEMINI_CIROOT=${{ github.workspace }}/ci" >> ~/gemini3d.env

    - name: Run Matlab (< R2024b) tests
      if: ${{ matrix.release < 'R2024b' }}
      timeout-minutes: 15
      uses: matlab-actions/run-build@v3
      with:
        tasks: test

    - name: Run unit tests (>= R2024b)
      if: ${{ matrix.release >= 'R2024b' }}
      timeout-minutes: 5
      uses: matlab-actions/run-build@v3
      with:
        tasks: test:unit

    - name: Run MSIS tests (>= R2024b)
      if: ${{ matrix.release >= 'R2024b' }}
      timeout-minutes: 5
      uses: matlab-actions/run-build@v3
      with:
        tasks: test:msis

    - name: Run Gemini3D tests (>= R2024b)
      if: ${{ matrix.release >= 'R2024b' }}
      timeout-minutes: 5
      uses: matlab-actions/run-build@v3
      with:
        tasks: test:gemini
